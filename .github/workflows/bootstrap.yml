name: Bootstrap project

on:
  push:
    paths:
      - ".github/workflows/bootstrap.yml"

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebuild source archive
        run: |
          cat .bootstrap/part-* > /tmp/project.tar.gz.b64
          base64 --decode /tmp/project.tar.gz.b64 > /tmp/project.tar.gz
          echo "0b269607efef7bcd3cdd5515c6d37df5bc8bbe7b3f507c40a454c5a850822aa8  /tmp/project.tar.gz" | sha256sum --check

      - name: Extract application
        run: |
          tar -xzf /tmp/project.tar.gz -C .
          rm -rf .bootstrap .github/workflows/bootstrap.yml

      - name: Commit application
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: implement Youtubemusic PRD"
          git push

# Triggered after the workflow exists on the default branch.
