name: Package source for deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package source
        run: |
          tar --exclude=.git --exclude=.next --exclude=node_modules -czf youtubemusic-source.tar.gz .

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtubemusic-source
          path: youtubemusic-source.tar.gz
          retention-days: 1
